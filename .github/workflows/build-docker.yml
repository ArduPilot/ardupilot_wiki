name: Build dockerfile

on:
  push:
    paths:
      - 'Sphinxsetup.sh'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/build-docker.yml'
  pull_request:
    paths:
      - 'Sphinxsetup.sh'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/build-docker.yml'

jobs:

  build-docker:

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: |
          docker build . -t ardupilot_wiki --build-arg USER_UID=$(id -u) --build-arg USER_GID=$(id -g)
