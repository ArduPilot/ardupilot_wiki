name: Test wiki Linux

on: [push, pull_request]
# paths:
# - "*"
# - "!README.md" <-- don't rebuild on doc change
env: 
  TEST: "1"
jobs:

  pre-commit:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - uses: pre-commit/action@v3.0.1

  shellcheck:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - run: find . -type f -name "*.sh" -exec shellcheck {} +

  build-linux:

    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false  # don't cancel if a job from the matrix fails
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setting environment
        run: |
          mkdir /tmp/web
          ./Sphinxsetup.sh
      - name: Check image formats
        run: |
          for i in $(find ./images/); do
              BAD=false
              if file "$i" | grep RIFF; then
                  echo "$i contains RIFF metadata; process file to remove"
                  BAD=true
              fi
              if $BAD; then
                  echo "Bad images found"
                  exit 1
              fi
          done
      - name: Register Sphinx problem matcher
        run: echo "::add-matcher::.github/problem-matchers/sphinx.json"
      - name: Test build
        run: |
          export AP_SPHINXOPTS=-W
          ./update.py --parallel 4 --verbose --destdir=/tmp/web 2>&1 | tee build_errors.txt; exit ${PIPESTATUS[0]}
      - name: Report build errors
        if: failure()
        run: |
          if [ -s build_errors.txt ]; then
            echo "## Build errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat build_errors.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
