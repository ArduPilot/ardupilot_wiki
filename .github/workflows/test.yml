name: Test wiki Linux

on: [push, pull_request]
# paths:
# - "*"
# - "!README.md" <-- don't rebuild on doc change
env: 
  TEST: "1"
jobs:

  pre-commit:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: 3.x
    - uses: pre-commit/action@v3.0.1

  shellcheck:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - name: find . -type f -name "*.sh" -exec shellcheck {} +
      run: |
        shellcheck --version
        find . -type f -name "*.sh" -exec shellcheck {} +

  build-linux:
    strategy:
      fail-fast: false  # don't cancel if a job from the matrix fails
      matrix:
        os: [ubuntu-latest]  # [ubuntu-22.04, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setting environment
        run: |
          mkdir /tmp/web
          ./Sphinxsetup.sh
      - name: Check image formats
        run: |
          for i in $(find ./images/); do
              BAD=false
              if file "$i" | grep RIFF; then
                  echo "$i contains RIFF metadata; process file to remove"
                  BAD=true
              fi
              if $BAD; then
                  echo "Bad images found"
                  exit 1
              fi
          done
      - name: Test build
        run: |
          export AP_SPHINXOPTS=-W
          .venv/bin/python update.py --parallel 4 --verbose --destdir=/tmp/web
